<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport corrigé : no zoom, safe area pour iPhone notch -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CloserDebrief" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Mac / desktop -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO -->
    <meta name="description" content="L'outil de débrief et de pilotage des équipes commerciales" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>CloserDebrief</title>

    <style>
      /* Reset zoom & scaling issues */
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        min-height: 100%;
        background: linear-gradient(160deg, #f5ede6 0%, #e8f0f5 100%);
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: linear-gradient(160deg, #f5ede6 0%, #e8f0f5 100%);
        color: #5a4a3a;
        /* Safe area pour iPhone notch / Dynamic Island */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      #root {
        min-height: 100vh;
      }
      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: radial-gradient(circle at 16% 8%, #213349 0%, transparent 38%), radial-gradient(circle at 84% 14%, #4b2f34 0%, transparent 34%), linear-gradient(160deg, #131927 0%, #1b2232 52%, #161a28 100%);
          color: #e8edf5;
        }
      }
      /* Prevent double-tap zoom on buttons */
      button, a, input, select, textarea {
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.getRegistrations()
            .then(regs => Promise.all(regs.map(reg => reg.unregister())))
            .catch(() => {});
        });
      }
      if ('caches' in window) {
        window.addEventListener('load', () => {
          caches.keys()
            .then(keys => Promise.all(keys.map(key => caches.delete(key))))
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
